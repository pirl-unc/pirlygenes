[project]
name = "pirlygenes"
requires-python = ">=3.9"
authors = [ {name="Alex Rubinsteyn", email="alex.rubinsteyn@unc.edu" } ]
description = "Gene lists for cancer immunotherapy expression analysis"
classifiers = [
    "Programming Language :: Python :: Implementation :: CPython",
    'Environment :: Console',
    'Operating System :: OS Independent',
    'Intended Audience :: Science/Research',
    'License :: OSI Approved :: Apache Software License',
    'Topic :: Scientific/Engineering :: Bio-Informatics',
]
readme = "README.md"
dynamic = ["version"]
dependencies = [
    "numpy>=2.0.0",
    "pandas>=2.0",
    "pyensembl>=2.6.0",
    "argh",
    "openpyxl",
    "matplotlib>=3.5.0",
    "seaborn>=0.11.0",
    "tqdm",
]

[tool.setuptools.dynamic]
version = {attr = "pirlygenes.version.__version__"}

[tool.setuptools]
packages = ["pirlygenes"]



[project.urls]
"Homepage" = "https://github.com/pirl-unc/pirlygenes"
"Bug Tracker" = "https://github.com/pirl-unc/pirlygenes"

[project.scripts]
pirlygenes = "pirlygenes.cli:main"


[build-system]
requires = [
    "setuptools>=60",
    "setuptools-scm>=8.0"]

[tool.setuptools.package-data]
pirlygenes = ["data/*.csv"]

