[project]
name = "pirlygenes"
requires-python = ">=3.9"
authors = [ {name="Alex Rubinsteyn", email="alex.rubinsteyn@unc.edu" } ]
description = "Curated cancer gene sets and reference expression data. Analysis lives in `trufflepig`."
classifiers = [
    "Programming Language :: Python :: Implementation :: CPython",
    'Environment :: Console',
    'Operating System :: OS Independent',
    'Intended Audience :: Science/Research',
    'License :: OSI Approved :: Apache Software License',
    'Topic :: Scientific/Engineering :: Bio-Informatics',
]
readme = "README.md"
dynamic = ["version"]
dependencies = [
    "numpy>=2.0.0",
    "openpyxl>=3.1.0",
    "pandas>=2.0",
    "pyensembl>=2.6.0",
    "PyYAML>=6.0",
    "tqdm",
]

[tool.setuptools.dynamic]
version = {attr = "pirlygenes.version.__version__"}

[tool.setuptools.packages.find]
include = ["pirlygenes*"]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov",
    "pytest-xdist",
]

[project.urls]
"Homepage" = "https://github.com/pirl-unc/pirlygenes"
"Bug Tracker" = "https://github.com/pirl-unc/pirlygenes"

# Shim that prints a "moved to trufflepig" message and exits 2. Keeps
# `pirlygenes` on PATH from breaking with `command not found` for users
# whose CI/batch jobs still invoke the old analyze CLI. See pirlygenes/cli.py.
[project.scripts]
pirlygenes = "pirlygenes.cli:main"

[build-system]
requires = [
    "setuptools>=60",
    "setuptools-scm>=8.0"]

[tool.setuptools.package-data]
pirlygenes = ["data/*"]

[tool.pytest.ini_options]
addopts = "-n auto"
markers = [
    "perf: performance-regression fences",
]
