      RiboDeplete (released Jan 2025; TPM matrix 2025-03-19).
      GSE294353.
    accession: GSE294353
    files:
      tpm: Tumor-25.01-Ribodeplete_hugo_log2tpm_58581genes_2025-03-19.tsv
      clinical: clinical_Treehouse-Tumor-Compendium-25.01-RiboD_20250306v1.tsv
      tpm_url: https://xena.treehouse.gi.ucsc.edu/download/Tumor-25.01-Ribodeplete_hugo_log2tpm_58581genes_2025-03-19.tsv
      clinical_url: https://xena.treehouse.gi.ucsc.edu/download/clinical_Treehouse-Tumor-Compendium-25.01-RiboD_20250306v1.tsv
    special_handling: >
      RiboD (ribo-depleted) sibling of treehouse-polya-25-01; 2,079
      samples. Same builder works after pointing `--cache-dir` /
      `--tpm-file` / `--clinical-file` at the RiboD files. For
      genes in the technical-RNA panel (rRNA / mtRNA), values from
      the ribo-depleted library are not directly comparable to PolyA
      cohorts — keep these cohorts in separate source_cohort tags so
      consumers can hold the assay difference.

