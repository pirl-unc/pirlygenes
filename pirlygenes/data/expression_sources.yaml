  # ─── Generic GEO-matrix Tier-A sources ─────────────────────────────────
  # All built via scripts/build_geo_matrix.py + the YAML config below.
  # Each carries the source-id, the direct-download URL, the unit
  # (TPM/FPKM/RPKM/log2-TPM/raw_counts), the gene-id type, and any
  # special handling. `pirlygenes build <source-id>` dispatches to
  # scripts/build_geo_matrix.py which reads this block.

  - id: gse120328-hl
    category: expression
    cancer_codes: [HL]
    source_type: geo-matrix
    builder: scripts/build_geo_matrix.py
    file_url: https://ftp.ncbi.nlm.nih.gov/geo/series/GSE120nnn/GSE120328/suppl/GSE120328_DESeq2_fpkm.tsv.gz
    file_name: GSE120328_DESeq2_fpkm.tsv.gz
    unit: FPKM
    gene_id_col: ""
    gene_id_type: hugo
    sample_filter:
      include_match: "_TU$"   # tumor LCM only; drop _NTC controls
    source_cohort: GSE120328_LAMPRECHT_2018
    source_project: GEO
    citation: Lamprecht 2018 PMID 30546079 (cHL LCM bulk RNA-seq)
    expected_size_gb: 0.01
    notes: >
      Lamprecht 2018 (cHL): LCM-enriched HRS cells from 5 cHL biopsies
      (sample IDs end _TU; 5 paired non-tumor _NTC excluded by
      sample_filter). FPKM → per-sample sum-to-1e6 → clean TPM. n=5;
      HRS-cell-specific not whole-tumor — flag for TME comparisons.

  - id: gse142334-fl
    category: expression
    cancer_codes: [FL]
