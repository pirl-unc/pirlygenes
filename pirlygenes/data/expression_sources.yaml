# Registry of every cohort-level expression data source consumed by
# pirlygenes. Drives `pirlygenes downloads`, `pirlygenes build`, and
# the cache layout under ~/.cache/pirlygenes/expression/<id>/.
#
# Field reference:
#   id                 — stable identifier; matches the cache subdir.
#   category           — expression | (future) protein, etc.
#   cancer_codes       — pirlygenes cancer codes this source feeds.
#   source_type        — gdc | geo | broad-cllmap | treehouse-compendium
#                        | summary-only-import | pan-cancer-fpkm-table
#   builder            — Python module/script that knows how to build
#                        per-gene-per-cohort summaries from this source.
#                        Today these are scripts/build_*.py; will move
#                        to pirlygenes/builders/ when the
#                        `pirlygenes build` dispatcher lands
#                        (see docs/expression-data-refresh-plan.md
#                        milestone 2).
#   project_id         — GDC project, when source_type == gdc.
#   accession          — GEO series accession, when source_type == geo.
#   url                — Direct download URL for single-file sources.
#   unit               — Native quantification unit at the source.
#   expected_size_gb   — Rough estimate of cached size after fetch.
#                        Used to summarize total disk usage. Treated
#                        as a hint, not a hard cap.
#   citation           — PMID / DOI / project URL for the source.
#   special_handling   — Inclusion/exclusion or interpretation quirks
#                        a re-runner needs to remember.

schema_version: 1

sources:
  # ---- existing GDC builders ----

  - id: cgci-blgsp
    category: expression
    cancer_codes: [BL]
    source_type: gdc
    project_id: CGCI-BLGSP
    builder: scripts/build_bl_gdc_reference_expression.py
    unit: TPM
    expected_size_gb: 2
    citation: https://portal.gdc.cancer.gov/projects/CGCI-BLGSP
    special_handling: >
      Open GDC STAR-counts; one deterministic primary-tumor sample per
      case. GENCODE v36 → Ensembl 112.

  - id: mmrf-commpass
    category: expression
