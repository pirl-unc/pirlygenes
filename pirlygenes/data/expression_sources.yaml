    category: expression
    cancer_codes: [CHOR, RB]
    source_type: treehouse-compendium
    url: https://public.gi.ucsc.edu/~ekephart/public-data/#tumor_25.01_ribodeplete
    builder: scripts/sweep_treehouse_ribod_cohorts.py
