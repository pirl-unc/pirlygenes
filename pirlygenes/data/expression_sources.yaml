    expected_size_gb: 0.1
    source_cohort: GSE30929_SINGER_2007_LPS
    tumor_origin: primary
    special_handling: >
      Affymetrix HG-U133A (GPL96) microarray; 140 primary liposarcomas
      from MSKCC, explicitly histology-tagged via char_subtype: 52 WD-LPS,
      40 DD-LPS, 20 pleomorphic, 17 myxoid, 11 myxoid/round-cell. The
