  # ---- imported via scripts/import_cancer_specific_expression.py ----
  # These come from external neutral-summary tables, not per-sample
  # quantifications. Extended-stat columns (std/min/max/p5/p10/p90/p95)
  # are NaN here until the relevant per-sample fetcher lands —
  # see docs/expression-data-refresh-plan.md milestone 6.

  - id: treehouse-polya-25-01
    category: expression
    cancer_codes:
      [ATRT, EWS, HEPB, MBL, NUTM, OS,
       RMS_ARMS, RMS_ERMS, RMS_PRMS, RMS_SSRMS,
       SARC_LMS, SARC_LPS_UNSPEC, SARC_MYXFIB, SARC_SYN, SARC_UPS]
    source_type: treehouse-compendium
    url: https://public.gi.ucsc.edu/~ekephart/public-data/#tumor_25.01_polya
    builder: scripts/sweep_treehouse_polya_cohorts.py
    sibling_builders:
      - scripts/sweep_treehouse_tcga_cohorts.py  # TCGA subset of this file
      - scripts/build_treehouse_reference_expression.py  # single-cohort CLI
    unit: log2(TPM+1)
    expected_size_gb: 6.2
    citation: >
      Treehouse Childhood Cancer Initiative, Tumor Compendium 25.01
      PolyA (released Jan 2025; clinical 20250131v1, TPM matrix
      2025-02-27). GSE294351.
    files:
      tpm: Tumor-25.01-Polya_hugo_log2tpm_58581genes_2025-02-27.tsv
      clinical: clinical_Treehouse-Tumor-Compendium-25.01-PolyA_20250131v1.tsv
      tpm_url: https://xena.treehouse.gi.ucsc.edu/download/Tumor-25.01-Polya_hugo_log2tpm_58581genes_2025-02-27.tsv
      clinical_url: https://xena.treehouse.gi.ucsc.edu/download/clinical_Treehouse-Tumor-Compendium-25.01-PolyA_20250131v1.tsv
    special_handling: >
      13,359 samples × 58,581 genes; matrix is RSEM log2(TPM+1) keyed
      by HUGO symbol. Builder inverse-transforms to TPM, subsets by
      `clinical.disease == <label>`, harmonizes HUGO to Ensembl
      release 112, sums TPM across symbols that collapse to the same
      ENSG, then runs the standard tech-RNA zero + per-sample
      renormalize before stat summarization. Same builder is
      parameterized for every Treehouse cancer code listed above.
      The TCGA subset (~9,800 samples) of this same file is extracted
      by `scripts/sweep_treehouse_tcga_cohorts.py` and tagged
      `source_cohort=TREEHOUSE_POLYA_25_01_TCGA_SUBSET` so a future
      authoritative GDC build can land alongside without clobbering.

