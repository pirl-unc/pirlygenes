    cancer_codes: [SARC_WDLPS, SARC_DDLPS, SARC_PLEOLPS, SARC_MYXLPS]
    source_type: geo-microarray
    builder: scripts/build_v5_5_microarray_cohorts.py
    builder_args: ["--only", "lps"]
