      FUS::DDIT3 fusion entity), so both collapse to SARC_MYXLPS (n=28).
      Builds 4 shards from one cohort via sample_include_regex
      (matched against char_subtype). MYXLPS biology validates:
      FABP4 2799 / ADIPOQ 917 / PPARG 424 (adipogenic program),
      FUS+DDIT3 both ~165 (fusion partners both expressed), STAT3 253 +
      JAK1 207 (FUS-DDIT3/JAK-STAT axis per PMC8851354).
