name: Tests
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtual environment and install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv
          source .venv/bin/activate
          uv pip install coveralls pylint ruff
          uv pip install '.[test]'
      - name: Cache pyensembl data
        uses: actions/cache@v4
        with:
          path: ~/.cache/pyensembl/
          key: pyensembl-112-${{ runner.os }}
      - name: Cache NCBI gene-data mirror
        # Build-time Entrez tables (Homo_sapiens.gene_info.gz + gene_history.gz)
        # pulled from the pinned GitHub release. Keyed on the module that pins
        # GENE_DATA_MIRROR_TAG so bumping the tag invalidates the cache.
        uses: actions/cache@v4
        with:
          path: ~/.cache/pirlygenes/ncbi_gene_info/
          key: ncbi-gene-data-${{ runner.os }}-${{ hashFiles('pirlygenes/builders/ncbi_gene_info.py') }}
      - name: Cache pirlygenes data bundle
        # The ~367 MB downloadable cohort summaries the expression tests fetch
        # from the version-pinned release. Keyed on version.py (DATA_VERSION) so
        # a data release re-fetches; otherwise reused across CI runs.
        uses: actions/cache@v4
        with:
          path: ~/.cache/pirlygenes/bundled_data/
          key: pirlygenes-bundle-${{ runner.os }}-${{ hashFiles('pirlygenes/version.py') }}
      - name: Cache source-data mirror
        # Raw per-source inputs (small/medium: GEO, CLL-map) mirrored to a
        # pinned release for FTP-independent builds. Keyed on the mirror module.
        uses: actions/cache@v4
        with:
          path: ~/.cache/pirlygenes/source_data/
          key: pirlygenes-source-data-${{ runner.os }}-${{ hashFiles('pirlygenes/builders/source_data_mirror.py') }}
      - name: Install Ensembl genome data
        run: |
          source .venv/bin/activate
          echo "Before installing Ensembl release 112" && df -h
          pyensembl install --release 112 --species homo_sapiens
          echo "After installing Ensembl release 112" && df -h
          # Fail fast if release 112 isn't usable — the gene-resolution
          # tests depend on it and would otherwise silently *skip* (a
          # green CI run that never actually exercised them).
          python -c "from pyensembl import EnsemblRelease; assert EnsemblRelease(112).genes_by_name('TP53'); print('Ensembl release 112 ready')"
      - name: Run linting script and unit tests
        run: |
          source .venv/bin/activate
          ./lint.sh
          ./test.sh
